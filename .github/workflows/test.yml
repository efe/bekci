name: Test

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-slim

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests

  build:
    name: Build package
    runs-on: ubuntu-slim

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build
