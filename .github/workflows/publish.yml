name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/bekci
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Validate tag matches package version
        run: |
          python - <<'PY'
          import ast
          import os
          import pathlib

          ref = os.environ["GITHUB_REF_NAME"]
          if not ref.startswith("v"):
              raise SystemExit(f"Expected tag starting with 'v', got: {ref}")

          expected_version = ref[1:]
          init_file = pathlib.Path("bekci/__init__.py")
          tree = ast.parse(init_file.read_text(encoding="utf-8"))

          package_version = None
          for node in tree.body:
              if not isinstance(node, ast.Assign):
                  continue
              if not any(
                  isinstance(target, ast.Name) and target.id == "__version__"
                  for target in node.targets
              ):
                  continue
              if isinstance(node.value, ast.Constant) and isinstance(node.value.value, str):
                  package_version = node.value.value
                  break

          if package_version is None:
              raise SystemExit("Could not find bekci.__version__")

          if package_version != expected_version:
              raise SystemExit(
                  f"Tag version '{expected_version}' does not match package version "
                  f"'{package_version}'"
              )

          print(f"Publishing version {package_version}")
          PY

      - name: Build distributions
        run: python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
