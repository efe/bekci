name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-slim
    environment:
      name: pypi
      url: https://pypi.org/p/bekci
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
